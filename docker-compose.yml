services:
  db:
    image: postgres:16-alpine
    container_name: observability-watchdog-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-watchdog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-watchdog}
      POSTGRES_DB: ${POSTGRES_DB:-watchdog}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-watchdog} -d ${POSTGRES_DB:-watchdog}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: observability-watchdog-api
    environment:
      APP_NAME: ${APP_NAME:-Observability Watchdog}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-watchdog}:${POSTGRES_PASSWORD:-watchdog}@db:5432/${POSTGRES_DB:-watchdog}
      API_V1_PREFIX: ${API_V1_PREFIX:-/api/v1}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
